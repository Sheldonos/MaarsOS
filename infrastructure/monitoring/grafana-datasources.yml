# Grafana Datasources Configuration for MAARS
# Phase 3: Monitoring Infrastructure

apiVersion: 1

# List of datasources to insert/update
datasources:
  # Prometheus datasource for metrics
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      queryTimeout: 60s
      # Custom query parameters
      customQueryParameters: ''
      # Enable exemplars
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: loki
    version: 1

  # Loki datasource for logs
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        # Extract trace IDs from logs
        - datasourceUid: prometheus
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: '$${__value.raw}'
        # Extract request IDs from logs
        - datasourceUid: loki
          matcherRegex: "request_id=(\\w+)"
          name: RequestID
          url: '$${__value.raw}'
    version: 1

  # Additional datasource for future use (e.g., Tempo for tracing)
