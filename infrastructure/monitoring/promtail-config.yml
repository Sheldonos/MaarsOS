# Promtail Configuration for MAARS Log Shipping
# Phase 3: Monitoring Infrastructure

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
  # Docker container logs
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # Extract container ID
      - source_labels: ['__meta_docker_container_id']
        target_label: 'container_id'
      
      # Extract image name
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      
      # Extract service labels
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      
      # Extract project labels
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: 'project'
      
      # Set log path
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/*.log'
    
    pipeline_stages:
      # Parse Docker JSON logs
      - docker: {}
      
      # Extract log level from message
      - regex:
          expression: '(?P<level>DEBUG|INFO|WARN|WARNING|ERROR|FATAL|CRITICAL)'
      
      # Set log level label
      - labels:
          level:
      
      # Extract trace_id if present
      - regex:
          expression: 'trace_id=(?P<trace_id>[a-zA-Z0-9]+)'
      
      # Set trace_id label
      - labels:
          trace_id:
      
      # Extract request_id if present
      - regex:
          expression: 'request_id=(?P<request_id>[a-zA-Z0-9-]+)'
      
      # Set request_id label
      - labels:
          request_id:
      
      # Extract user_id if present
      - regex:
          expression: 'user_id=(?P<user_id>[a-zA-Z0-9-]+)'
      
      # Set user_id label
      - labels:
          user_id:
      
      # Add timestamp
      - timestamp:
          source: time
          format: RFC3339Nano
      
      # Drop healthcheck logs to reduce noise
      - match:
          selector: '{container=~".*"} |~ "GET /health"'
          action: drop
      
      # Drop metrics endpoint logs
      - match:
          selector: '{container=~".*"} |~ "GET /metrics"'
          action: drop

  # System logs (optional, for host-level monitoring)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*.log
    
    pipeline_stages:
      # Parse syslog format
      - regex:
          expression: '^(?P<timestamp>\w+\s+\d+\s+\d+:\d+:\d+)\s+(?P<hostname>\S+)\s+(?P<app>\S+)(\[(?P<pid>\d+)\])?: (?P<message>.*)$'
      
      # Set labels
      - labels:
          hostname:
          app:
      
      # Set timestamp
      - timestamp:
          source: timestamp
          format: 'Jan 02 15:04:05'

  # Vessel Gateway logs
  - job_name: vessel-gateway
    static_configs:
      - targets:
          - localhost
        labels:
          job: vessel-gateway
          service: vessel-gateway
          tier: gateway
          phase: '1'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ['maars-vessel-gateway']

  # Vessel Orchestrator logs
  - job_name: vessel-orchestrator
    static_configs:
      - targets:
          - localhost
        labels:
          job: vessel-orchestrator
          service: vessel-orchestrator
          tier: core
          phase: '1'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ['maars-vessel-orchestrator']

  # Vessel Sandbox logs
  - job_name: vessel-sandbox
    static_configs:
      - targets:
          - localhost
        labels:
          job: vessel-sandbox
          service: vessel-sandbox
          tier: execution
          phase: '1'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ['maars-vessel-sandbox']

  # Vessel LLM Router logs
  - job_name: vessel-llm-router
    static_configs:
      - targets:
          - localhost
        labels:
          job: vessel-llm-router
          service: vessel-llm-router
          tier: ai
          phase: '2'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ['maars-vessel-llm-router']

  # Vessel Swarm logs
  - job_name: vessel-swarm
    static_configs:
      - targets:
          - localhost
        labels:
          job: vessel-swarm
          service: vessel-swarm
          tier: core
          phase: '2'
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ['maars-vessel-swarm']

# Limits
limits_config:
  readline_rate: 10000
  readline_burst: 20000

