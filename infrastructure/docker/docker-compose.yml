version: '3.8'

services:
  # Mock AstraDB / Postgres for local dev
  postgres:
    image: postgres:16
    container_name: maars-postgres
    environment:
      POSTGRES_USER: maars
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maars
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maars"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mock Astra Streaming / Kafka for local dev (using Redpanda for simplicity)
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: maars-kafka
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=info
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: maars-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Kong API Gateway
  kong:
    image: kong:3.5
    container_name: maars-kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_URL: "http://localhost:8002"
    ports:
      - "8000:8000"  # Proxy
      - "8001:8001"  # Admin API
      - "8002:8002"  # Admin GUI
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  # HashiCorp Vault for secrets management
  vault:
    image: hashicorp/vault:latest
    container_name: maars-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "dev-root-token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO for local S3-compatible artifact storage
  minio:
    image: minio/minio:latest
    container_name: maars-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Vessel Sandbox - WASM execution engine
  vessel-sandbox:
    build:
      context: ../../services/vessel-sandbox
      dockerfile: Dockerfile
    container_name: maars-vessel-sandbox
    environment:
      RUST_LOG: info
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: maars-artifacts
      MINIO_PUBLIC_URL: http://localhost:9000
    ports:
      - "8085:8085"
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vessel Orchestrator - Master orchestration service
  vessel-orchestrator:
    build:
      context: ../../services/vessel-orchestrator
      dockerfile: Dockerfile
    container_name: maars-vessel-orchestrator
    environment:
      SERVICE_NAME: vessel-orchestrator
      SERVICE_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 8081
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_GOALS: maars.goals
      KAFKA_TOPIC_TASKS: maars.tasks
      KAFKA_TOPIC_EVENTS: maars.events
      SANDBOX_URL: http://vessel-sandbox:8085
      LLM_ROUTER_URL: http://vessel-llm-router:8082
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    ports:
      - "8081:8081"
    depends_on:
      redpanda:
        condition: service_healthy
      redis:
        condition: service_healthy
      vessel-sandbox:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vessel Swarm - Agent lifecycle management service
  vessel-swarm:
    build:
      context: ../../services/vessel-swarm
      dockerfile: Dockerfile
    container_name: maars-vessel-swarm
    environment:
      SERVICE_NAME: vessel-swarm
      SERVICE_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 8083
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: maars
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maars
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_AGENTS: maars.agents
      KAFKA_TOPIC_EVENTS: maars.events
      LOG_LEVEL: INFO
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vessel Gateway - API Gateway with JWT auth and rate limiting
  vessel-gateway:
    build:
      context: ../../services/vessel-gateway
      dockerfile: Dockerfile
    container_name: maars-vessel-gateway
    environment:
      SERVICE_NAME: vessel-gateway
      SERVICE_VERSION: 0.1.0
      ENVIRONMENT: development
      PORT: 8080
      ORCHESTRATOR_URL: http://vessel-orchestrator:8081
      JWT_SECRET: dev-secret-change-in-production
      JWT_ISSUER: maars-auth
      JWT_AUDIENCE: maars-api
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      vessel-orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Vessel LLM Router - Intelligent LLM routing and caching
  vessel-llm-router:
    build:
      context: ../../services/vessel-llm-router
      dockerfile: Dockerfile
    container_name: maars-vessel-llm-router
    environment:
      SERVICE_NAME: vessel-llm-router
      SERVICE_VERSION: 0.1.0
      PORT: 8082
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LOG_LEVEL: INFO
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "grpc_health_probe", "-addr=:8082"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # Vessel Observability - Guardrails, anomaly detection, and telemetry
  vessel-observability:
    build:
      context: ../../services/vessel-observability
      dockerfile: Dockerfile
    image: vessel-observability:latest
    container_name: maars-vessel-observability
    environment:
      SERVICE_NAME: vessel-observability
      SERVICE_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 8087
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: maars
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maars
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_EVENTS: maars.events
      KAFKA_TOPIC_VIOLATIONS: maars.violations
      KAFKA_TOPIC_ANOMALIES: maars.anomalies
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${OBSERVABILITY_LOG_LEVEL:-INFO}
      GUARDRAIL_EVALUATION_TIMEOUT: ${GUARDRAIL_EVALUATION_TIMEOUT:-5}
      ANOMALY_DETECTION_WINDOW: ${ANOMALY_DETECTION_WINDOW:-300}
      ANOMALY_Z_SCORE_THRESHOLD: ${ANOMALY_Z_SCORE_THRESHOLD:-3.0}
    ports:
      - "8087:8087"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # Vessel Economics - Escrow, cost tracking, and budget enforcement
  vessel-economics:
    build:
      context: ../../services/vessel-economics
      dockerfile: Dockerfile
    image: vessel-economics:latest
    container_name: maars-vessel-economics
    environment:
      SERVICE_NAME: vessel-economics
      SERVICE_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 8090
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: maars
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maars
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_TRANSACTIONS: maars.transactions
      KAFKA_TOPIC_COSTS: maars.costs
      KAFKA_TOPIC_EVENTS: maars.events
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${ECONOMICS_LOG_LEVEL:-INFO}
      ESCROW_TRANSACTION_TIMEOUT: ${ESCROW_TRANSACTION_TIMEOUT:-30}
      BUDGET_CHECK_TIMEOUT: ${BUDGET_CHECK_TIMEOUT:-5}
      COMPLIANCE_RETENTION_DAYS: ${COMPLIANCE_RETENTION_DAYS:-2555}
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  # Prometheus - Metrics collection and alerting
  prometheus:
    image: prom/prometheus:latest
    container_name: maars-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Loki - Log aggregation
  loki:
    image: grafana/loki:latest
    container_name: maars-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ../monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Promtail - Log shipping to Loki
  promtail:
    image: grafana/promtail:latest
    container_name: maars-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - default
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # Grafana - Visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: maars-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3000
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3000:3000"
    volumes:
      - ../monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - grafana_data:/var/lib/grafana
    networks:
      - default
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Exporter - Export Redis metrics to Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: maars-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - default
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Postgres Exporter - Export PostgreSQL metrics to Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: maars-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://maars:password@postgres:5432/maars?sslmode=disable"
    ports:
      - "9187:9187"
    networks:
      - default
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Qdrant - Vector database for semantic memory search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: maars-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Neo4j - Graph database for knowledge graphs
  neo4j:
    image: neo4j:5.15-community
    container_name: maars-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 512m
    networks:
      - default
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Vessel Memory - Long-term memory with vector search and knowledge graphs
  vessel-memory:
    build:
      context: ../../services/vessel-memory
      dockerfile: Dockerfile
    image: vessel-memory:latest
    container_name: maars-vessel-memory
    environment:
      SERVICE_NAME: vessel-memory
      SERVICE_VERSION: 0.1.0
      HOST: 0.0.0.0
      PORT: 8084
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: maars
      POSTGRES_PASSWORD: password
      POSTGRES_DB: maars
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      KAFKA_BROKERS: redpanda:9092
      KAFKA_TOPIC_MEMORY: maars.memory
      KAFKA_TOPIC_EVENTS: maars.events
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: 1536
      LOG_LEVEL: ${MEMORY_LOG_LEVEL:-INFO}
      VECTOR_SEARCH_TIMEOUT: ${VECTOR_SEARCH_TIMEOUT:-5}
      GRAPH_QUERY_TIMEOUT: ${GRAPH_QUERY_TIMEOUT:-10}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:
  redpanda_data:
  redis_data:
  minio_data:
  prometheus_data:
  loki_data:
  grafana_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

networks:
  default:
    name: maars-network

# Made with Bob
